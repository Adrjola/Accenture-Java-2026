<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelter - Login</title>
    <style>
        body { font-family: sans-serif; max-width: 520px; margin: 2rem auto; padding: 0 1rem; }
        nav { background: #f1f5f9; padding: 0.6rem 1rem; border-radius: 6px; margin-bottom: 1.5rem; }
        nav a { margin-right: 1rem; text-decoration: none; color: #2563eb; }
        nav a:hover { text-decoration: underline; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 0.4rem; }
        form { display: grid; gap: 0.6rem; margin-top: 1rem; }
        label { font-weight: bold; }
        input { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 0.6rem 1.2rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; width: fit-content; }
        button:hover { background: #1d4ed8; }
        .error { padding: 0.75rem; background: #fee2e2; color: #991b1b; border-radius: 4px; }
        .message { padding: 0.75rem; background: #dcfce7; color: #166534; border-radius: 4px; }
        .hint { color: #4b5563; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main>
    <h1>Shelter staff login</h1>
    <p class="hint">Sign in to add new animals or manage protected shelter actions.</p>

    <p th:if="${param.error}" class="error" role="alert">Invalid username or password</p>
    <p th:if="${param.logout}" class="message" role="status">You have been logged out.</p>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">Sign in</button>
    </form>
</main>
</body>
</html>
