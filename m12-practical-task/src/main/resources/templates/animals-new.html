<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelter - Add Animal</title>
    <style>
        body { font-family: sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
        nav { background: #f1f5f9; padding: 0.6rem 1rem; border-radius: 6px; margin-bottom: 1.5rem; }
        nav a { margin-right: 1rem; text-decoration: none; color: #2563eb; }
        nav a:hover { text-decoration: underline; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 0.4rem; }
        form { display: grid; gap: 0.5rem; max-width: 480px; margin-top: 1rem; }
        label { font-weight: bold; }
        input, select, textarea { padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
        button { padding: 0.6rem 1.2rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; width: fit-content; }
        button:hover { background: #1d4ed8; }
        .back-link { display: inline-block; margin-top: 1rem; color: #2563eb; }
        .error { color: #b91c1c; font-size: 0.9rem; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main>
    <h1>Add a new animal</h1>

    <form th:action="@{/animals}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <label for="name">Name</label>
        <input id="name" th:field="*{name}" type="text" required placeholder="e.g. Milo">
        <span class="error" th:errors="*{name}"></span>

        <label for="type">Type</label>
        <select id="type" th:field="*{type}" th:attr="data-selected=*{type}" required></select>
        <span class="error" th:errors="*{type}"></span>

        <label for="breed">Breed</label>
        <input id="breed" th:field="*{breed}" type="text" placeholder="e.g. Siamese">
        <span class="error" th:errors="*{breed}"></span>

        <label for="age">Age (years)</label>
        <input id="age" th:field="*{age}" type="number" min="0" placeholder="e.g. 3">
        <span class="error" th:errors="*{age}"></span>

        <label for="description">Description</label>
        <textarea id="description" th:field="*{description}" rows="3"
                  placeholder="A short description of the animal's personality"></textarea>
        <span class="error" th:errors="*{description}"></span>

        <label for="imageUrl">Image filename or URL</label>
        <input id="imageUrl" th:field="*{imageUrl}" type="text" placeholder="Luna.jpeg">
        <span class="error" th:errors="*{imageUrl}"></span>

        <button type="submit">Add animal</button>
    </form>

    <a th:href="@{/animals}" class="back-link">Back to list</a>
</main>
<script>
    const typeSelect = document.getElementById('type');
    const selectedType = typeSelect.dataset.selected;

    function addOption(value, text) {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = text;
        if (value === selectedType) {
            option.selected = true;
        }
        typeSelect.appendChild(option);
    }

    fetch('/api/animal-types')
        .then(response => response.json())
        .then(types => {
            addOption('', '-- choose --');
            types.forEach(type => addOption(type, type));
        });
</script>
</body>
</html>
